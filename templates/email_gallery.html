<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: auto; padding: 24px;">
    <h2>Hi {{ guest_name }},</h2>
    <p>Great news! Your photos from the event are ready.</p>
    <p>
        <a href="{{ gallery_url }}" style="
            display: inline-block;
            background: #4f46e5;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        ">View My Photos</a>
    </p>
    <p style="color:#888; font-size:0.9em;">
        Or copy this link: {{ gallery_url }}
    </p>
    <hr style="border:none; border-top:1px solid #eee; margin: 24px 0;" />
    <p style="color:#aaa; font-size:0.8em;">This gallery is private and only accessible via this link.</p>
</body>
</html>
